# Veritas AI — Production Nginx Configuration

# 1. Rate Limiting Configuration (DDoS & Abuse Prevention)
limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=15r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.veritas.ai; # Replace with your Vultr domain name

    # Global HTTP to HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.veritas.ai;

    # 2. SSL/TLS Parameters (Security & Encryption Moat)
    ssl_certificate /etc/letsencrypt/live/api.veritas.ai/fullchain.pem; # Managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.veritas.ai/privkey.pem;
    
    # Modern TLS profile (A+ Security standard)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 3. Gzip Compression (Blazing Fast responses)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # 4. Global Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 5. API Proxy endpoints (FastAPI routing)
    location / {
        # Apply Rate Limiting: Max burst of 25 requests, delay excess requests
        limit_req zone=api_limit_zone burst=25 nodelay;

        # Standard Proxy configurations
        proxy_pass http://127.0.0.1:8000; # Forward requests to uvicorn daemon
        proxy_http_version 1.1;
        
        # Keep connection alive for fast client-side fetching
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Real IP Forwarding (Crucial for Rate limiting & Location logging)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: Allow heavy literature shadow synthesis without server dropouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
